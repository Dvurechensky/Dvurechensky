<!doctype html>
<html lang="{{ page.lang | default: 'ru' }}">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>
			{{ page.title | default: site.title }} {% if page.description %} | {{
			page.description }} {% else %} | {{ site.description }} {% endif %}
		</title>
		<meta
			name="description"
			content="{{ page.description | default: site.description }}"
		/>
		<link
			rel="stylesheet"
			href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}"
		/>
		{% include head-custom.html %}
	</head>
	<body>
		<div id="title">
			<h1>{{ page.title | default: site.title }}</h1>
			<p>{{ page.description | default: site.description }}</p>
			<hr />

			<span class="credits left">
				Project maintained by
				<a href="https://github.com/{{ site.github.owner_name }}">
					{{ site.github.owner_name }}
				</a>
			</span>

			<span class="credits right">
				Hosted on GitHub Pages — Theme by
				<a href="https://twitter.com/mattgraham">mattgraham</a>
			</span>
		</div>

		<div id="content">
			{{ content }}

			<div class="header-actions">
				<a
					href="https://github.com/Dvurechensky"
					target="_blank"
					class="github-btn"
				>
					<svg class="gh-icon" viewBox="0 0 24 24">
						<path
							fill="currentColor"
							d="M12 0C5.37 0 0 5.37 0 12a12 12 0 008.2 11.4c.6.1.82-.26.82-.58v-2.02c-3.34.73-4.04-1.61-4.04-1.61-.55-1.4-1.34-1.77-1.34-1.77-1.1-.76.08-.75.08-.75 1.22.09 1.86 1.25 1.86 1.25 1.08 1.85 2.84 1.31 3.53 1 .1-.78.42-1.31.76-1.61-2.67-.3-5.47-1.34-5.47-5.94 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23a11.4 11.4 0 016 0c2.28-1.55 3.29-1.23 3.29-1.23.67 1.65.26 2.87.13 3.17.77.84 1.24 1.91 1.24 3.22 0 4.61-2.8 5.64-5.48 5.94.43.37.82 1.1.82 2.22v3.29c0 .32.21.7.83.58A12 12 0 0024 12c0-6.63-5.37-12-12-12z"
						/>
					</svg>
				</a>
			</div>
		</div>
	</body>
</html>
